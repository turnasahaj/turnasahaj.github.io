<script>
const menuBtn = document.getElementById("menuBtn");
const drawerOverlay = document.getElementById("drawerOverlay");
const drawer = document.getElementById("drawer");
const drawerBackdrop = document.getElementById("drawerBackdrop");

function openDrawer() {
    drawerOverlay.classList.remove("hidden");
    setTimeout(() => {
        drawer.classList.remove("-translate-x-full");
        drawerBackdrop.classList.remove("opacity-0");
    }, 10);
}

function closeDrawer() {
    drawer.classList.add("-translate-x-full");
    drawerBackdrop.classList.add("opacity-0");
    setTimeout(() => {
        drawerOverlay.classList.add("hidden");
    }, 300);
}

menuBtn.addEventListener("click", openDrawer);
drawerBackdrop.addEventListener("click", closeDrawer);
</script>

<script>
const profileImage = document.getElementById("profileImage");
const profileInput = document.getElementById("profileInput");
const deleteProfileBtn = document.getElementById("deleteProfileBtn");

const defaultImage = "assets/default-profile.png";

// Load saved image
const savedImage = localStorage.getItem("userProfileImage");

if (savedImage) {
    profileImage.src = savedImage;
    deleteProfileBtn.classList.remove("hidden");
}

// Click image to upload
profileImage.addEventListener("click", () => {
    profileInput.click();
});

// When new image selected
profileInput.addEventListener("change", function () {

    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        profileImage.src = e.target.result;
        localStorage.setItem("userProfileImage", e.target.result);
        deleteProfileBtn.classList.remove("hidden");
    };

    reader.readAsDataURL(file);
});

// Delete profile
deleteProfileBtn.addEventListener("click", () => {
    localStorage.removeItem("userProfileImage");
    profileImage.src = defaultImage;
    deleteProfileBtn.classList.add("hidden");
});
</script>

<script>
function openHelp(){
    document.getElementById("helpModal").style.display = "flex";
}

function closeHelp(){
    document.getElementById("helpModal").style.display = "none";
}

function sendComplaint(){

    const name = document.getElementById("helpName").value.trim();
    const email = document.getElementById("helpEmail").value.trim();
    const message = document.getElementById("helpMessage").value.trim();

    if(!name || !email || !message){
        alert("Please fill all fields");
        return;
    }

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    const newComplaint = {
        id: Date.now(),
        username: name,
        email: email,
        message: message,
        status: "new",
        date: new Date().toLocaleString()
    };

    complaints.unshift(newComplaint);

    localStorage.setItem("complaints", JSON.stringify(complaints));

    alert("Complaint Sent Successfully!");

    document.getElementById("helpName").value = "";
    document.getElementById("helpEmail").value = "";
    document.getElementById("helpMessage").value = "";

    closeHelp();
}
</script>

/* Preview */
function previewFile(file) {
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const wrapper = document.createElement("div");
        wrapper.className = "flex justify-end";

        const img = document.createElement("img");
        img.src = e.target.result;
        img.className = "max-w-[200px] rounded-xl shadow-lg";

        wrapper.appendChild(img);
        chatContainer.appendChild(wrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        setTimeout(() => {

            const aiWrapper = document.createElement("div");
            aiWrapper.className = "flex justify-start";

            const bubble = document.createElement("div");
            bubble.className =
                "bg-[#2b1b12] border border-primary/20 text-slate-100 rounded-2xl rounded-bl-none px-5 py-3 shadow-lg";

            bubble.innerText =
                "I received your image. Image analysis feature will be added soon.";

            aiWrapper.appendChild(bubble);
            chatContainer.appendChild(aiWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;

        }, 800);
    };

    reader.readAsDataURL(file);
}

    cameraInput.addEventListener("change", e => previewFile(e.target.files[0]));
}

if (photoInput) {
    photoInput.addEventListener("change", e => previewFile(e.target.files[0]));
}

if (fileInput) {
    fileInput.addEventListener("change", e => previewFile(e.target.files[0]));

<script type="module">
import { supabase } from "./auth/supabase.js"

const chatContainer = document.getElementById("chat-container");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

/* ================= CREATE MESSAGE ================= */

function createMessage(content, sender) {

    const wrapper = document.createElement("div");
    wrapper.className = "w-full flex";

    wrapper.classList.add(
        sender === "user" ? "justify-end" : "justify-start"
    );

    const bubble = document.createElement("div");
    bubble.className = `
        max-w-[75%]
        px-5 py-3
        rounded-2xl
        text-sm
        shadow-lg
    `;

    if (sender === "user") {
        bubble.classList.add(
            "bg-gradient-to-r",
            "from-[#ffa600]",
            "to-[#ffcc66]",
            "text-black",
            "rounded-br-none"
        );
    } else {
        bubble.classList.add(
            "bg-[#2b1b12]",
            "border",
            "border-primary/20",
            "text-slate-100",
            "rounded-bl-none"
        );
    }

    bubble.innerText = content;
    wrapper.appendChild(bubble);
    chatContainer.appendChild(wrapper);

    chatContainer.scrollTop = chatContainer.scrollHeight;
}

/* ================= LOAD OLD MESSAGES ================= */
async function loadOldMessages() {

    const sessionId = localStorage.getItem("activeSession");

    console.log("ACTIVE SESSION:", sessionId);

    if (!sessionId) return;

    const { data: messages, error } = await supabase
        .from("chat_messages")
        .select("*")
        .eq("session_id", sessionId)
        .order("created_at", { ascending: true });

    if (error) {
        console.log("Supabase error:", error);
        return;
    }

    if (!messages || messages.length === 0) {
        console.log("No messages found");
        return;
    }

    chatContainer.innerHTML = "";

    messages.forEach(msg => {
        createMessage(msg.content, msg.role);
    });
} 

/* ================= ENSURE SESSION ================= */

async function ensureSession() {

    let sessionId = localStorage.getItem("activeSession");
    if (sessionId) return sessionId;

    const { data: userData } = await supabase.auth.getUser();
    if (!userData.user) return null;

    const { data: session } = await supabase
        .from("chat_sessions")
        .insert([
            {
                user_id: userData.user.id,
                title: "New Chat"
            }
        ])
        .select()
        .single();

    localStorage.setItem("activeSession", session.id);
    return session.id;
}

/* ================= SEND MESSAGE ================= */

async function handleSend() {

    const message = messageInput.value.trim();
    if (!message) return;

    const sessionId = await ensureSession();
    if (!sessionId) return;

    createMessage(message, "user");
    messageInput.value = "";
    createMessage("Thinking...", "assistant");

    try {

        const { data: userData } = await supabase.auth.getUser();

        const response = await fetch("http://192.168.31.207:5000/chat", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        message: message,
        user_id: userData.user.id,
        session_id: sessionId
    })
});

        const result = await response.json();

        chatContainer.lastChild.remove();
        createMessage(result.reply || "No response", "assistant");

    } catch (err) {

        chatContainer.lastChild.remove();
        createMessage("Server error.", "assistant");
    }
}

/* ================= EVENTS ================= */

sendBtn.addEventListener("click", handleSend);

messageInput.addEventListener("keydown", e => {
    if (e.key === "Enter") handleSend();
});

/* ================= AUTO LOAD ================= */
await loadOldMessages();
</script>
</body>
</html>
